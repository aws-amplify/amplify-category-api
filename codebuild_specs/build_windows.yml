version: 0.2
env:
  shell: powershell.exe
  variables:
    NODE_OPTIONS: --max-old-space-size=8096
phases:
  pre_build:
    commands:
      - choco install -fy nodejs-lts --version=24.12.0
      - choco install visualstudio2022buildtools --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --includeRecommended --quiet" -y --force
      - refreshenv
      - cmd /c "vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath"
      - |
        $nodeVersion = node -v
        Write-Host "Node version: $nodeVersion"
  build:
    commands:
      - yarn run production-build
      - yarn build-tests
artifacts:
  files:
    - 'shared-scripts.sh'
