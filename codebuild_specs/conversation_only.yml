# THROWAWAY ITERATION AID — REMOVE BEFORE MERGE.
# Minimal CodeBuild batch that builds + publishes to the local registry and then runs ONLY the
# conversation `client tool usage` e2e test. Lets each iteration finish in ~20-40 min instead of the
# multi-hour full CDK batch (codebuild_specs/e2e_workflow_cdk.yml).
# Trigger with:
#   aws codebuild start-build-batch --buildspec-override codebuild_specs/conversation_only.yml ...
version: 0.2
env:
  shell: bash
  compute-type: BUILD_GENERAL1_MEDIUM
  variables:
    JSII_DEPRECATED: quiet
batch:
  fast-fail: false
  build-graph:
    - identifier: build_linux
      buildspec: codebuild_specs/build_linux.yml
      env:
        compute-type: BUILD_GENERAL1_LARGE
    - identifier: publish_to_local_registry
      buildspec: codebuild_specs/publish_to_local_registry.yml
      env:
        compute-type: BUILD_GENERAL1_MEDIUM
      depend-on:
        - build_linux
    - identifier: conversation
      buildspec: codebuild_specs/run_cdk_tests.yml
      env:
        compute-type: BUILD_GENERAL1_MEDIUM
        variables:
          NODE_OPTIONS: '--max-old-space-size=6656'
          TEST_SUITE: src/__tests__/conversations/conversation.test.ts
          CLI_REGION: us-west-2
          USE_PARENT_ACCOUNT: 1
      depend-on:
        - publish_to_local_registry
    - identifier: cleanup_e2e_resources
      buildspec: codebuild_specs/cleanup_e2e_resources.yml
      env:
        compute-type: BUILD_GENERAL1_SMALL
        variables:
          JSII_DEPRECATED: quiet
      depend-on:
        - conversation
